<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PM Intelligence v2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0e17;color:#e2e8f0;min-height:100vh}
.header{background:linear-gradient(135deg,#1a1f2e,#0d1117);padding:20px 30px;border-bottom:1px solid #1e293b;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:22px;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.status{display:flex;align-items:center;gap:8px;font-size:14px}
.dot{width:10px;height:10px;border-radius:50%;background:#22c55e;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;padding:20px 30px}
.card{background:#111827;border:1px solid #1e293b;border-radius:12px;padding:20px}
.card h3{font-size:13px;text-transform:uppercase;color:#64748b;margin-bottom:12px;letter-spacing:1px}
.big-num{font-size:32px;font-weight:700;margin-bottom:4px}
.sub{font-size:13px;color:#64748b}
.green{color:#22c55e}.red{color:#ef4444}.blue{color:#60a5fa}.purple{color:#a78bfa}.yellow{color:#eab308}
.trades-section{padding:0 30px 30px}
.trades-section h2{font-size:16px;margin-bottom:12px;color:#94a3b8}
.trade-list{display:flex;flex-direction:column;gap:8px;max-height:400px;overflow-y:auto}
.trade-item{background:#111827;border:1px solid #1e293b;border-radius:8px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center}
.trade-q{font-size:14px;flex:1;margin-right:12px;line-height:1.4}
.trade-side{font-size:12px;font-weight:600;padding:4px 10px;border-radius:4px}
.trade-side.YES{background:#22c55e22;color:#22c55e}
.trade-side.NO{background:#ef444422;color:#ef4444}
.trade-conf{font-size:13px;color:#64748b;min-width:60px;text-align:right}
.llm-tag{font-size:10px;background:#a78bfa22;color:#a78bfa;padding:2px 6px;border-radius:3px;margin-left:8px}
.cost-bar{display:flex;gap:16px;flex-wrap:wrap}
.cost-item{font-size:13px;color:#94a3b8}
.cost-item span{font-weight:600}
.memory-section{padding:0 30px 30px}
.lesson{background:#111827;border:1px solid #1e293b;border-radius:8px;padding:12px 16px;margin-bottom:8px;font-size:13px;line-height:1.5;color:#94a3b8}
.lesson strong{color:#e2e8f0}
.empty{color:#475569;font-size:14px;padding:20px;text-align:center}
.ws-status{font-size:12px;padding:2px 8px;border-radius:4px;background:#1e293b}
.ws-status.connected{color:#22c55e}.ws-status.disconnected{color:#ef4444}
</style>
</head>
<body>
<div class="header">
  <h1>PM Intelligence v2</h1>
  <div class="status">
    <div class="dot" id="wsDot"></div>
    <span class="ws-status" id="wsStatus">Connecting...</span>
  </div>
</div>
<div class="grid" id="statsGrid">
  <div class="card"><h3>Portfolio</h3><div class="big-num blue" id="balance">$--</div><div class="sub">Cash Balance</div></div>
  <div class="card"><h3>P&L</h3><div class="big-num" id="pnl">$--</div><div class="sub" id="winLoss">-- W / -- L</div></div>
  <div class="card"><h3>Active Trades</h3><div class="big-num purple" id="activeTrades">--</div><div class="sub" id="invested">$-- invested</div></div>
  <div class="card"><h3>LLM Costs</h3><div class="big-num yellow" id="llmCost">$--</div><div class="cost-bar"><div class="cost-item">Haiku: <span id="haikuCalls">0</span></div><div class="cost-item">Sonnet: <span id="sonnetCalls">0</span></div></div></div>
  <div class="card"><h3>Markets Scanned</h3><div class="big-num blue" id="marketsCount">--</div><div class="sub" id="volumeSpikes">-- volume spikes</div></div>
  <div class="card"><h3>Memory</h3><div class="big-num purple" id="lessonsCount">--</div><div class="sub">lessons learned</div></div>
</div>
<div class="trades-section">
  <h2>Recent Trades</h2>
  <div class="trade-list" id="tradeList"><div class="empty">Waiting for data...</div></div>
</div>
<div class="memory-section">
  <h2 style="font-size:16px;margin-bottom:12px;color:#94a3b8">Latest Lessons</h2>
  <div id="lessonsList"><div class="empty">Agent is learning...</div></div>
</div>
<script>
const $ = id => document.getElementById(id);
let ws, reconnectTimer;

function fmt(n, d=2) {
  if (n == null) return '--';
  return Number(n).toLocaleString('en-US', {minimumFractionDigits: d, maximumFractionDigits: d});
}

function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + location.host + '/ws');
  ws.onopen = () => {
    $('wsStatus').textContent = 'Live';
    $('wsStatus').className = 'ws-status connected';
    $('wsDot').style.background = '#22c55e';
  };
  ws.onclose = () => {
    $('wsStatus').textContent = 'Reconnecting...';
    $('wsStatus').className = 'ws-status disconnected';
    $('wsDot').style.background = '#ef4444';
    reconnectTimer = setTimeout(connect, 3000);
  };
  ws.onmessage = (e) => {
    try { update(JSON.parse(e.data)); } catch(err) { console.error(err); }
  };
}

function update(d) {
  // Portfolio
  if (d.portfolio) {
    $('balance').textContent = '$' + fmt(d.portfolio.cash_balance);
    const pnl = d.portfolio.total_pnl || 0;
    $('pnl').textContent = (pnl >= 0 ? '+$' : '-$') + fmt(Math.abs(pnl));
    $('pnl').className = 'big-num ' + (pnl >= 0 ? 'green' : 'red');
    $('winLoss').textContent = (d.portfolio.win_count||0) + ' W / ' + (d.portfolio.loss_count||0) + ' L';
  }
  // Active trades (from 'trades' key in broadcast)
  if (d.trades) {
    const open = d.trades.filter(t => t.status === 'OPEN');
    $('activeTrades').textContent = open.length;
    let inv = 0;
    open.forEach(t => inv += (t.cost || t.amount || 0));
    $('invested').textContent = '$' + fmt(inv) + ' invested';
  }
  // LLM costs
  if (d.llm_costs) {
    $('llmCost').textContent = '$' + fmt(d.llm_costs.total_cost_usd, 4);
    $('haikuCalls').textContent = d.llm_costs.haiku_calls || 0;
    $('sonnetCalls').textContent = d.llm_costs.sonnet_calls || 0;
  }
  // Markets
  if (d.markets) {
    $('marketsCount').textContent = d.markets.length;
  }
  // Volume spikes
  if (d.volume_spikes != null) {
    $('volumeSpikes').textContent = d.volume_spikes + ' volume spikes';
  }
  // Memory
  if (d.memory_stats) {
    $('lessonsCount').textContent = d.memory_stats.total_lessons || 0;
  }
  // Recent trades list (backend sends 'trades')
  if (d.trades && d.trades.length > 0) {
    $('tradeList').innerHTML = d.trades.slice(0, 20).map(t => {
      const llm = t.llm_reasoning ? '<span class="llm-tag">LLM</span>' : '';
      const side = t.direction || t.side || 'YES';
      const status = t.status === 'OPEN' ? '<span style="color:#22c55e;font-size:10px;margin-left:6px">OPEN</span>' :
                     t.status === 'CLOSED' ? '<span style="color:#64748b;font-size:10px;margin-left:6px">CLOSED</span>' : '';
      return '<div class="trade-item">' +
        '<div class="trade-q">' + (t.market_question||t.question||'Unknown') + llm + status + '</div>' +
        '<div class="trade-side ' + side + '">' + side + ' @ ' + fmt(t.entry_price||t.price, 2) + '</div>' +
        '<div class="trade-conf">$' + fmt(t.cost||0, 0) + '</div>' +
        '</div>';
    }).join('');
  }
  // Lessons
  if (d.lessons && d.lessons.length > 0) {
    $('lessonsList').innerHTML = d.lessons.slice(0, 5).map(l =>
      '<div class="lesson"><strong>' + (l.category||'General') + ':</strong> ' + (l.lesson||l.content||'') + '</div>'
    ).join('');
  }
}

// Also fetch initial data via REST
async function fetchInitial() {
  try {
    const [pRes, cRes, mRes] = await Promise.all([
      fetch('/api/portfolio').then(r=>r.json()),
      fetch('/api/llm/costs').then(r=>r.json()),
      fetch('/api/llm/memory').then(r=>r.json()).catch(()=>({}))
    ]);
    update({portfolio: pRes, llm_costs: cRes, memory_stats: mRes});
  } catch(e) { console.error('Initial fetch error:', e); }
}

fetchInitial();
connect();
</script>
</body>
</html>
